<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>问卷系统</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial; margin: 20px; }
label { display: block; margin-top: 10px; }
input, select, button { margin-top: 5px; }
.optionContainer { margin-left: 20px; }
.questionBlock { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
#questionArea { margin-top: 20px; }
#surveyStats { margin-top: 20px; border-top: 1px solid #000; padding-top: 10px; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>问卷系统首页</h1>

<section>
  <h2>注册 / 登录</h2>
  <input id="username" placeholder="用户名">
  <input id="password" placeholder="密码" type="password">
  <button onclick="register()">注册</button>
  <button onclick="login()">登录</button>
  <p id="authResult"></p>
</section>

<hr>

<section>
  <h2>创建问卷（一次性完成）</h2>
  <input id="surveyTitle" placeholder="问卷标题">
  <input id="surveyDesc" placeholder="问卷说明">
  <label>允许匿名填写 <input type="checkbox" id="allowAnon"></label>

  <hr>

  <h3>添加题目</h3>
  <label>题目ID：<input type="text" id="questionId" value="q1"></label>
  <label>题型：
    <select id="questionType">
      <option value="single_choice">单选</option>
      <option value="multi_choice">多选</option>
      <option value="text">文本</option>
      <option value="number">数字</option>
    </select>
  </label>
  <label>必填：<input type="checkbox" id="required" checked></label>

  <div id="optionsContainer" class="optionContainer"></div>
  <div id="validationContainer" class="optionContainer"></div>

  <button onclick="addQuestionToLocal()">添加题目到问卷</button>
  <p id="addQuestionResult"></p>

  <hr>

  <h3>添加跳转逻辑</h3>
  <label>源题ID：<input id="logicSource" placeholder="源题ID"></label>
  <label>目标题ID：<input id="logicTarget" placeholder="目标题ID"></label>
  <label>选项值：<input id="logicValue" placeholder="选项值"></label>
  <button onclick="addLogicToLocal()">添加跳转逻辑</button>
  <p id="addLogicResult"></p>

  <hr>

  <button onclick="submitSurvey()">提交整个问卷</button>
  <p id="submitSurveyResult"></p>
</section>

<hr>

<section>
  <h2>填写问卷</h2>
  <div id="questionArea"></div>
  <button onclick="submitResponse()">提交答卷</button>
  <p id="submitResult"></p>
</section>

<hr>

<section>
  <h2>统计结果</h2>
  <button onclick="fetchStats()">查看统计</button>
  <div id="surveyStats"></div>
</section>

<script src="main.js"></script>
<script>
window.onload = () => {
  renderOptionsInput();
  renderValidationInputs();
  document.getElementById("questionType").addEventListener("change", () => {
    renderOptionsInput();
    renderValidationInputs();
  });
};
</script>
</body>
</html>
