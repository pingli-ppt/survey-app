<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建问卷 - 问卷系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 10px;
            color: #333;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input {
            width: auto;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: white;
            text-decoration: none;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 创建新问卷</h1>
            <div class="subtitle">填写问卷基本信息，稍后可以添加题目</div>
            
            <div id="message"></div>
            
            <form id="createForm">
                <div class="form-group">
                    <label>问卷标题 *</label>
                    <input type="text" id="title" required placeholder="例如：用户满意度调查">
                </div>
                
                <div class="form-group">
                    <label>问卷描述</label>
                    <textarea id="description" placeholder="简单介绍一下这份问卷的目的..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="allowAnonymous">
                        <span>允许匿名提交</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="allowMultipleSubmit" checked>
                        <span>允许重复提交</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label>截止日期（可选）</label>
                    <input type="datetime-local" id="deadline">
                </div>
                
                <button type="submit" id="submitBtn">创建问卷 →</button>
            </form>
        </div>
        <a href="/dashboard.html" class="back-link">← 返回控制台</a>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        // 检查登录状态
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }
        
        const form = document.getElementById('createForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value.trim();
            if (!title) {
                showMessage('请填写问卷标题', 'error');
                return;
            }
            
            const data = {
                title: title,
                description: document.getElementById('description').value.trim(),
                allowAnonymous: document.getElementById('allowAnonymous').checked,
                allowMultipleSubmit: document.getElementById('allowMultipleSubmit').checked,
                deadline: document.getElementById('deadline').value || null
            };
            
            submitBtn.disabled = true;
            submitBtn.textContent = '创建中...';
            showMessage('正在创建问卷...', 'loading');
            
            try {
                const res = await fetch(`${API_BASE}/create-survey`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    showMessage('✅ 问卷创建成功！正在跳转...', 'success');
                    
                    // 重要：保存创建的问卷信息
                    console.log('创建的问卷:', result.survey);
                    console.log('surveyId:', result.survey.surveyId);
                    
                    // 跳转到编辑页面（可以添加题目）
                    setTimeout(() => {
                        window.location.href = `/edit.html?surveyId=${result.survey.surveyId}`;
                    }, 1500);
                } else {
                    showMessage('❌ 创建失败：' + (result.error || '未知错误'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '创建问卷 →';
                }
            } catch (err) {
                console.error('创建问卷错误:', err);
                showMessage('❌ 网络错误：' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '创建问卷 →';
            }
        });
        
        function showMessage(msg, type) {
            messageDiv.innerHTML = `<div class="${type}-msg">${msg}</div>`;
            if (type === 'loading') {
                messageDiv.innerHTML = `<div class="loading">${msg}</div>`;
            }
        }
    </script>
</body>
</html>
